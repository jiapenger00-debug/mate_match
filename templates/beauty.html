<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a0a14">
    <title>颜值 PK · 灵魂契合度</title>
    <link rel="stylesheet" href="/static/beauty.css">
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="切换明暗主题"></button>
    <div class="hearts-container" aria-hidden="true">
        <span class="heart-particle">🌸</span><span class="heart-particle">💕</span><span class="heart-particle">✨</span><span class="heart-particle">💖</span><span class="heart-particle">🌹</span><span class="heart-particle">💗</span><span class="heart-particle">🫧</span><span class="heart-particle">💝</span><span class="heart-particle">💫</span><span class="heart-particle">🌸</span>
    </div>

    <div class="beauty-hero">
        <h1>颜值 PK</h1>
        <p>上传双方照片，AI 为你解析颜值匹配度</p>
    </div>

    <div class="beauty-pk">
        <div class="beauty-side" id="girl-side">
            <div class="beauty-upload" id="girl-upload" onclick="document.getElementById('girl-file').click()">
                <div class="beauty-upload-plus">+</div>
                <div class="beauty-upload-text">上传女方照片</div>
            </div>
            <input type="file" id="girl-file" accept="image/*" style="display:none" onchange="preview(this, 'girl')">
            <div class="beauty-result" id="girl-result">
                <div class="beauty-score-big" id="girl-score">-</div>
                <div class="beauty-score-label">颜值评分</div>
                <div class="beauty-detail" id="girl-detail"></div>
            </div>
        </div>

        <div class="beauty-vs">VS</div>

        <div class="beauty-side" id="user-side">
            <div class="beauty-upload" id="user-upload" onclick="document.getElementById('user-file').click()">
                <div class="beauty-upload-plus">+</div>
                <div class="beauty-upload-text">上传男方照片</div>
            </div>
            <input type="file" id="user-file" accept="image/*" style="display:none" onchange="preview(this, 'user')">
            <div class="beauty-result" id="user-result">
                <div class="beauty-score-big" id="user-score">-</div>
                <div class="beauty-score-label">颜值评分</div>
                <div class="beauty-detail" id="user-detail"></div>
            </div>
        </div>
    </div>

    <div style="text-align:center;padding:1rem;">
        <button class="share-expand-btn" id="analyze-btn" style="display:none;font-size:1rem;padding:0.6rem 2rem;" onclick="startAnalysis()">开始颜值分析</button>
    </div>

    <div class="beauty-match" id="beauty-match">
        <div class="beauty-match-score" id="match-score"></div>
        <div class="beauty-match-comment" id="match-comment"></div>
        <button class="share-expand-btn" style="display:block;margin:1rem auto 0;" onclick="resetAll()">再来一次</button>
    </div>

    <div style="text-align:center;padding:2rem;">
        <a href="/" class="btn" style="display:inline-block;width:auto;padding:0.8rem 2rem;text-decoration:none;">返回首页</a>
    </div>

    <footer class="footer"><p>颜值分析由 AI 生成，仅供参考</p></footer>

    <script>
        function preview(input, who) {
            var file = input.files[0];
            if (!file) return;
            document.getElementById(who + '-upload').innerHTML = '<img src="' + URL.createObjectURL(file) + '" alt=""><div class="beauty-upload-overlay">点击更换</div>';
            document.getElementById(who + '-upload').classList.add('has-photo');
            document.getElementById(who + '-upload').onclick = function () { document.getElementById(who + '-file').click(); };
            document.getElementById(who + '-result').classList.remove('visible');
            document.getElementById(who + '-score').textContent = '-';
            document.getElementById(who + '-detail').textContent = '';
            document.getElementById('beauty-match').classList.remove('visible');
            var gf = document.getElementById('girl-file').files[0];
            var uf = document.getElementById('user-file').files[0];
            document.getElementById('analyze-btn').style.display = (gf && uf) ? 'inline-block' : 'none';
        }
        function compressImage(file, callback) {
            if (file.size < 300 * 1024) { callback(file); return; }
            var reader = new FileReader();
            reader.onload = function (e) {
                var img = new Image();
                img.onload = function () {
                    var maxW = 800, maxH = 800;
                    var w = img.width, h = img.height;
                    if (w > maxW || h > maxH) {
                        var ratio = Math.min(maxW / w, maxH / h);
                        w = Math.round(w * ratio); h = Math.round(h * ratio);
                    }
                    var canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(function (blob) { callback(blob); }, 'image/jpeg', 0.5);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        function startAnalysis() {
            var gf = document.getElementById('girl-file').files[0];
            var uf = document.getElementById('user-file').files[0];
            if (!gf || !uf) return;
            document.getElementById('analyze-btn').style.display = 'none';
            document.getElementById('girl-score').textContent = '...';
            document.getElementById('user-score').textContent = '...';
            document.getElementById('girl-result').classList.add('visible');
            document.getElementById('user-result').classList.add('visible');
            document.getElementById('girl-detail').textContent = '正在压缩…';
            document.getElementById('user-detail').textContent = '正在压缩…';
            done = {}; data = {};
            function whoDone(who, d) { done[who] = true; if (d) data[who] = d; if (done.girl !== undefined && done.user !== undefined) showMatch(data.girl, data.user); }
            function sendOne(who, file) {
                compressImage(file, function (compressed) {
                    document.getElementById(who + '-detail').textContent = 'AI 正在分析中…';
                    var fd = new FormData();
                    fd.append('photo', compressed, who + '.jpg');
                    fetch('/api/beauty/single', { method: 'POST', body: fd })
                        .then(function (r) { return r.json(); })
                        .then(function (data) {
                            if (data.error) { document.getElementById(who + '-detail').textContent = '失败：' + data.error; whoDone(who, null); return; }
                            showResult(who, data);
                            whoDone(who, data);
                        }).catch(function () {
                            document.getElementById(who + '-detail').textContent = '超时，请重试';
                            whoDone(who, null);
                        });
                });
            }
            sendOne('girl', gf);
            sendOne('user', uf);
        }
        function showMatch(gd, ud) {
            if (!gd || !ud) {
                document.getElementById('match-comment').textContent = '一方分析失败，无法计算匹配度';
                document.getElementById('beauty-match').classList.add('visible');
                return;
            }
            var gap = Math.abs((gd.score||0) - (ud.score||0));
            var match = Math.max(0, 100 - Math.round(gap * 15));
            var comment;
            if (gap <= 0.5) comment = '天作之合，颜值非常登对！';
            else if (gap <= 1.5) comment = '颜值匹配度较高，很般配';
            else if (gap <= 2.5) comment = '颜值有一定差距，但互补也是魅力';
            else comment = '颜值差异较大，不过真爱不看脸';
            document.getElementById('match-score').textContent = '颜值匹配度：' + match + ' 分';
            document.getElementById('match-comment').textContent = comment;
            document.getElementById('beauty-match').classList.add('visible');
        }
        function showResult(who, data) {
            document.getElementById(who + '-result').classList.add('visible');
            document.getElementById(who + '-score').textContent = (data.score || 0).toFixed(1);
            var detail = (data.description || '') + '<br><br>';
            detail += '肤质：' + (data.skin || '-') + '<br>';
            detail += '脸型：' + (data.face_shape || '-') + '<br>';
            if (data.features) detail += data.features + '<br>';
            if (data.overall) detail += data.overall;
            document.getElementById(who + '-detail').innerHTML = detail;
        }
        function resetAll() {
            ['girl','user'].forEach(function (who) {
                var upload = document.getElementById(who + '-upload');
                upload.innerHTML = '<div class="beauty-upload-plus">+</div><div class="beauty-upload-text">上传' + (who==='girl'?'女方':'男方') + '照片</div>';
                upload.classList.remove('has-photo');
                upload.onclick = function () { document.getElementById(who + '-file').click(); };
                document.getElementById(who + '-file').value = '';
                document.getElementById(who + '-result').classList.remove('visible');
                document.getElementById(who + '-score').textContent = '-';
                document.getElementById(who + '-detail').textContent = '';
            });
            document.getElementById('beauty-match').classList.remove('visible');
            document.getElementById('analyze-btn').style.display = 'none';
            done = {}; data = {};
        }
        (function () {
            var t = document.getElementById('theme-toggle');
            var h = document.documentElement;
            var s = localStorage.getItem('theme');
            if (s) h.setAttribute('data-theme', s);
            t.addEventListener('click', function () {
                var n = h.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                h.setAttribute('data-theme', n); localStorage.setItem('theme', n);
            });
        })();
    </script>
</body>
</html>
