<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a0a14">
    <title>灵魂契合度 · 匹配分析</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/universities.js"></script>
    <script src="/static/demo-data.js"></script>
</head>
<body>
    <!-- 浮动心形粒子 -->
    <button class="theme-toggle" id="theme-toggle" aria-label="切换明暗主题"></button>
    <div class="hearts-container" aria-hidden="true">
        <span class="heart-particle">🌸</span>
        <span class="heart-particle">💕</span>
        <span class="heart-particle">✨</span>
        <span class="heart-particle">💖</span>
        <span class="heart-particle">🌹</span>
        <span class="heart-particle">💗</span>
        <span class="heart-particle">🫧</span>
        <span class="heart-particle">💝</span>
        <span class="heart-particle">💫</span>
        <span class="heart-particle">🌸</span>
    </div>

    <a href="#main-content" class="skip-link">跳到主内容</a>

    <header class="header">
        <h1>灵魂契合度</h1>
        <p>聆听两颗心的共振频率</p>
        <a href="/beauty" class="header-nav-link">💫 颜值 PK</a>
    </header>

    <main class="container" id="main-content">
        <form id="analyze-form" action="/api/analyze" method="POST" enctype="multipart/form-data">
            <!-- 女方信息 -->
            <section class="card">
                <h2>她</h2>
                <button type="button" class="ocr-import-btn" id="girl-ocr-btn" title="截图导入女方信息">📷 截图导入</button>
                <div class="form-row">
                    <div class="form-group">
                        <label for="girl_name">名字</label>
                        <input type="text" id="girl_name" name="girl_name" required
                               autocomplete="name" placeholder="她的名字…">
                    </div>
                    <div class="form-group">
                        <label for="girl_age">年龄</label>
                        <input type="number" id="girl_age" name="girl_age" min="14" max="80"
                               placeholder="选填…">
                    </div>
                    <div class="form-group">
                        <label for="girl_hometown">家乡</label>
                        <input type="text" id="girl_hometown" name="girl_hometown" placeholder="上海…">
                    </div>
                    <div class="form-group">
                        <label for="girl_occupation">职业</label>
                        <input type="text" id="girl_occupation" name="girl_occupation" placeholder="设计师…">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="girl_edu_level">学历</label>
                            <select id="girl_edu_level" name="girl_edu_level" style="width:100%;padding:0.7rem 0.9rem;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--text);font-size:0.93rem;font-family:inherit;">
                                <option value="">请选择…</option>
                                <option value="高中/中专">高中/中专</option>
                                <option value="大专">大专</option>
                                <option value="本科">本科</option>
                                <option value="硕士">硕士</option>
                                <option value="MBA">MBA</option>
                                <option value="博士">博士</option>
                                <option value="博士后">博士后</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group uni-search-wrap">
                            <label for="girl_edu_school">学校</label>
                            <input type="text" id="girl_edu_school" name="girl_edu_school" autocomplete="off" placeholder="输入学校名称…">
                            <div class="uni-search-dropdown" id="girl-uni-dropdown"></div>
                            <div class="uni-tags" id="girl-uni-tags"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="girl_appearance">外貌特征</label>
                        <input type="text" id="girl_appearance" name="girl_appearance" placeholder="身高165，长发…">
                    </div>
                    <div class="form-group full">
                        <label for="girl_personality">性格</label>
                        <textarea id="girl_personality" name="girl_personality"
                                  placeholder="她是什么样的人…"></textarea>
                    </div>
                    <div class="form-group full">
                        <label for="girl_interests">兴趣爱好</label>
                        <textarea id="girl_interests" name="girl_interests"
                                  placeholder="她喜欢做什么…"></textarea>
                    </div>
                    <div class="form-group full">
                        <label for="girl_values">人生态度</label>
                        <textarea id="girl_values" name="girl_values"
                                  placeholder="她追求怎样的生活…"></textarea>
                    </div>
                    <div class="form-group full">
                        <label for="girl_extra">更多关于她</label>
                        <textarea id="girl_extra" name="girl_extra"
                                  placeholder="任何你想记录的…"></textarea>
                    </div>
                    <input type="hidden" name="girl_edu_tags" id="girl_edu_tags">
                    <div class="form-group full photo-upload-wrap">
                        <label>照片（选填，用于颜值分析）</label>
                        <div class="photo-upload" onclick="document.getElementById('girl_photo').click()">
                            <span class="photo-upload-placeholder">+ 上传女方照片</span>
                            <img id="girl-photo-preview" style="display:none;max-width:100%;max-height:200px;border-radius:8px;">
                        </div>
                        <input type="file" id="girl_photo" name="girl_photo" accept="image/*" style="display:none"
                               onchange="photoPreview(this, 'girl')">
                    </div>
                </div>
            </section>

            <!-- 用户信息 -->
            <section class="card">
                <h2>你</h2>
                <button type="button" class="ocr-import-btn" id="user-ocr-btn" title="截图导入你的信息">📷 截图导入</button>
                <div class="form-row">
                    <div class="form-group">
                        <label for="user_name">名字</label>
                        <input type="text" id="user_name" name="user_name" required
                               autocomplete="name" placeholder="你的名字…">
                    </div>
                    <div class="form-group">
                        <label for="user_age">年龄</label>
                        <input type="number" id="user_age" name="user_age" min="14" max="80"
                               placeholder="选填…">
                    </div>
                    <div class="form-group">
                        <label for="user_hometown">家乡</label>
                        <input type="text" id="user_hometown" name="user_hometown" placeholder="北京…">
                    </div>
                    <div class="form-group">
                        <label for="user_occupation">职业</label>
                        <input type="text" id="user_occupation" name="user_occupation" placeholder="工程师…">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="user_edu_level">学历</label>
                            <select id="user_edu_level" name="user_edu_level" style="width:100%;padding:0.7rem 0.9rem;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--text);font-size:0.93rem;font-family:inherit;">
                                <option value="">请选择…</option>
                                <option value="高中/中专">高中/中专</option>
                                <option value="大专">大专</option>
                                <option value="本科">本科</option>
                                <option value="硕士">硕士</option>
                                <option value="MBA">MBA</option>
                                <option value="博士">博士</option>
                                <option value="博士后">博士后</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group uni-search-wrap">
                            <label for="user_edu_school">学校</label>
                            <input type="text" id="user_edu_school" name="user_edu_school" autocomplete="off" placeholder="输入学校名称…">
                            <div class="uni-search-dropdown" id="user-uni-dropdown"></div>
                            <div class="uni-tags" id="user-uni-tags"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="user_appearance">外貌特征</label>
                        <input type="text" id="user_appearance" name="user_appearance" placeholder="身高178…">
                    </div>
                    <div class="form-group full">
                        <label for="user_personality">性格</label>
                        <textarea id="user_personality" name="user_personality"
                                  placeholder="你是怎样的人…"></textarea>
                    </div>
                    <div class="form-group full">
                        <label for="user_interests">兴趣爱好</label>
                        <textarea id="user_interests" name="user_interests"
                                  placeholder="你喜欢做什么…"></textarea>
                    </div>
                    <div class="form-group full">
                        <label for="user_values">人生态度</label>
                        <textarea id="user_values" name="user_values"
                                  placeholder="你追求怎样的生活…"></textarea>
                    </div>
                    <div class="form-group full">
                        <label for="user_extra">更多关于你</label>
                        <textarea id="user_extra" name="user_extra"
                                  placeholder="任何你想说的…"></textarea>
                    </div>
                    <input type="hidden" name="user_edu_tags" id="user_edu_tags">
                    <div class="form-group full photo-upload-wrap">
                        <label>照片（选填，用于颜值分析）</label>
                        <div class="photo-upload" onclick="document.getElementById('user_photo').click()">
                            <span class="photo-upload-placeholder">+ 上传你的照片</span>
                            <img id="user-photo-preview" style="display:none;max-width:100%;max-height:200px;border-radius:8px;">
                        </div>
                        <input type="file" id="user_photo" name="user_photo" accept="image/*" style="display:none"
                               onchange="photoPreview(this, 'user')">
                    </div>
                </div>
            </section>

            <!-- ── 操作区 ── -->
            <section class="card">
                <div class="search-toggle">
                    <input type="checkbox" id="enable_search" name="enable_search" checked>
                    <label for="enable_search">搜索她的公开信息作为参考</label>
                </div>

                <p class="demo-label">一键填充示例：</p>
                <div class="demo-tags" id="demo-tags"></div>

                <div class="search-results-wrap" id="search-results-wrap">
                    <p class="search-result-count" id="search-result-count"></p>
                    <div class="search-results-list" id="search-results-list"></div>
                    <div class="demo-actions">
                        <button type="button" class="btn demo-btn-cancel" id="search-skip">跳过，直接分析</button>
                        <button type="button" class="btn" id="search-confirm">确认选择的，开始分析</button>
                    </div>
                </div>

                <div class="demo-preview" id="demo-preview" style="display:none;">
                    <div class="demo-preview-head">预览</div>
                    <div id="demo-preview-content"></div>
                </div>

                <div class="demo-actions" id="demo-actions" style="display:none;">
                    <button type="button" class="btn demo-btn-cancel" id="demo-cancel">取消</button>
                    <button type="button" class="btn" id="demo-confirm">确认填充</button>
                </div>

                <button type="submit" class="btn" id="submit-btn">
                    开始匹配分析
                </button>
            </section>
        </form>
    </main>

    <div class="search-overlay" id="search-overlay">
        <div class="search-overlay-text" id="search-overlay-text">正在搜索她的公开信息…</div>
        <div class="search-progress"><div class="search-progress-bar"></div></div>
        <p id="search-count" style="color:#9e8a8a;font-size:0.85rem;margin-top:0.8rem;"></p>
    </div>

    <footer class="footer">
        <p>分析结果由 AI 生成，仅供参考</p>
    </footer>

    <script>
        function photoPreview(input, who) {
            var file = input.files[0];
            if (!file) return;
            var preview = document.getElementById(who + '-photo-preview');
            var placeholder = input.parentElement.querySelector('.photo-upload-placeholder');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            if (placeholder) placeholder.style.display = 'none';
        }

        var form = document.getElementById('analyze-form');
        // 异步搜索 → 展示结果 → 确认 → 提交分析
        var searchOverlay = document.getElementById('search-overlay');
        var searchOverlayText = document.getElementById('search-overlay-text');
        var searchCount = document.getElementById('search-count');
        var searchResultsWrap = document.getElementById('search-results-wrap');
        var searchResultCount = document.getElementById('search-result-count');
        var searchResultsList = document.getElementById('search-results-list');
        var searchSkip = document.getElementById('search-skip');
        var searchConfirm = document.getElementById('search-confirm');
        var submitBtn = document.getElementById('submit-btn');
        var selectedResultsJson = '[]';

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            var enableSearch = document.getElementById('enable_search').checked;
            if (!enableSearch) {
                submitAnalysis('');
                return;
            }
            // 显示搜索动画
            searchOverlay.classList.add('visible');
            searchOverlayText.textContent = '正在搜索她的公开信息…';
            searchCount.textContent = '';
            submitBtn.disabled = true;
            submitBtn.textContent = '搜索中…';

            var fd = new FormData(form);
            fetch('/api/search', { method: 'POST', body: fd })
                .then(function (r) { return r.json(); })
                .then(function (results) {
                    searchOverlay.classList.remove('visible');
                    if (!results || !results.length) {
                        submitAnalysis(''); return;
                    }
                    searchResultCount.textContent = '找到 ' + results.length + ' 条结果，勾选要参考的内容：';
                    searchResultsList.innerHTML = '';
                    results.forEach(function (r, i) {
                        var card = document.createElement('div');
                        card.className = 'search-result-card checked';
                        card.innerHTML =
                            '<input type="checkbox" checked data-idx="' + i + '">' +
                            '<div class="search-result-body"><strong>' + r.title + '</strong><p>' + (r.snippet || '') + '</p></div>';
                        card.addEventListener('click', function (ev) {
                            if (ev.target.tagName === 'INPUT') return;
                            var cb = card.querySelector('input');
                            cb.checked = !cb.checked;
                            card.classList.toggle('checked', cb.checked);
                        });
                        searchResultsList.appendChild(card);
                    });
                    searchResultsWrap.classList.add('visible');
                    submitBtn.style.display = 'none';
                })
                .catch(function () {
                    searchOverlay.classList.remove('visible');
                    submitAnalysis('');
                });
        });

        function submitAnalysis(selectedJson) {
            searchResultsWrap.classList.remove('visible');
            submitBtn.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.textContent = 'AI 正在分析中…';
            searchOverlay.classList.add('visible');
            searchOverlayText.textContent = '正在解读两颗心的距离…';
            searchCount.textContent = '';
            var fd = new FormData(form);
            fd.append('selected_results', selectedJson);
            fetch('/api/analyze', { method: 'POST', body: fd })
                .then(function (r) { return r.text(); })
                .then(function (html) {
                    document.open(); document.write(html); document.close();
                });
        }

        searchSkip.addEventListener('click', function () { submitAnalysis('[]'); });
        searchConfirm.addEventListener('click', function () {
            var checked = [];
            document.querySelectorAll('.search-result-card input:checked').forEach(function (cb) {
                var idx = parseInt(cb.getAttribute('data-idx'));
                var card = cb.closest('.search-result-card');
                var titleEl = card.querySelector('strong');
                var snippetEl = card.querySelector('p');
                checked.push({ title: titleEl.textContent, url: '', snippet: snippetEl ? snippetEl.textContent : '' });
            });
            submitAnalysis(JSON.stringify(checked));
        });

        // 示例选择器
        (function () {
            var tagsEl = document.getElementById('demo-tags');
            var previewEl = document.getElementById('demo-preview');
            var previewContent = document.getElementById('demo-preview-content');
            var actionsEl = document.getElementById('demo-actions');
            var cancelBtn = document.getElementById('demo-cancel');
            var confirmBtn = document.getElementById('demo-confirm');
            var activeExample = null;
            var confirmedExample = null;
            // demo-data.js 使用 extra_info 作为键，但 HTML 表单字段名是 extra
            var fieldMap = { extra_info: 'extra' };

            // 渲染标签
            DEMO_EXAMPLES.forEach(function (ex) {
                var tag = document.createElement('span');
                tag.className = 'demo-tag';
                tag.textContent = ex.emoji + ' ' + ex.label;
                tag.addEventListener('click', function () { selectExample(ex, tag); });
                tagsEl.appendChild(tag);
            });

            function selectExample(ex, tag) {
                document.querySelectorAll('.demo-tag').forEach(function (t) {
                    t.classList.remove('active');
                    if (confirmedExample && t.textContent.indexOf(confirmedExample.label) >= 0) {
                        t.classList.add('confirmed');
                    }
                });
                tag.classList.add('active');
                activeExample = ex;
                var g = ex.girl, u = ex.user;
                previewContent.innerHTML =
                    '<div class="demo-preview-row"><strong>' + g.name + '</strong>：' +
                    g.personality.slice(0, 60) + '…</div>' +
                    '<div class="demo-preview-row"><strong>' + u.name + '</strong>：' +
                    u.personality.slice(0, 60) + '…</div>';
                previewEl.style.display = 'block';
                actionsEl.style.display = 'flex';
            }

            cancelBtn.addEventListener('click', function () {
                previewEl.style.display = 'none';
                actionsEl.style.display = 'none';
                activeExample = null;
                document.querySelectorAll('.demo-tag').forEach(function (t) {
                    t.classList.remove('active');
                    if (confirmedExample && t.textContent.indexOf(confirmedExample.label) >= 0) {
                        t.classList.add('confirmed');
                    }
                });
            });

            confirmBtn.addEventListener('click', function () {
                if (!activeExample) return;
                var ex = activeExample;
                ['girl', 'user'].forEach(function (who) {
                    var data = ex[who];
                    Object.keys(data).forEach(function (key) {
                        var htmlKey = fieldMap[key] || key;
                        var el = document.getElementById(who + '_' + htmlKey);
                        if (el && data[key] !== undefined) el.value = data[key];
                    });
                    // Show university tags if school is filled
                    var tagsData = data['edu_tags'];
                    if (tagsData) {
                        var tagsEl = document.getElementById(who + '-uni-tags');
                        if (tagsEl) {
                            var tags = tagsData.split(',');
                            tagsEl.innerHTML = formatTags(tags);
                        }
                    }
                });
                confirmedExample = activeExample;
                document.querySelectorAll('.demo-tag').forEach(function (t) {
                    t.classList.remove('active', 'confirmed');
                    if (t.textContent.indexOf(ex.label) >= 0) t.classList.add('confirmed');
                });
                previewEl.style.display = 'none';
                actionsEl.style.display = 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        })();

        // 学校搜索补全
        (function () {
            function setupUniSearch(inputId, dropdownId, tagsId, hiddenId) {
                var input = document.getElementById(inputId);
                var dropdown = document.getElementById(dropdownId);
                var tagsEl = document.getElementById(tagsId);
                var hidden = document.getElementById(hiddenId);
                if (!input) return;
                input.addEventListener('input', function () {
                    var results = searchUniversities(input.value);
                    if (!results.length) { dropdown.classList.remove('visible'); return; }
                    dropdown.innerHTML = '';
                    results.forEach(function (u) {
                        var item = document.createElement('div');
                        item.className = 'uni-search-item';
                        item.textContent = u.n + (u.t.length ? ' (' + u.t.join('/') + ')' : '');
                        item.addEventListener('click', function () {
                            input.value = u.n;
                            dropdown.classList.remove('visible');
                            tagsEl.innerHTML = formatTags(u.t);
                            hidden.value = u.t.join(',');
                        });
                        dropdown.appendChild(item);
                    });
                    dropdown.classList.add('visible');
                });
                input.addEventListener('blur', function () {
                    setTimeout(function () { dropdown.classList.remove('visible'); }, 200);
                });
            }
            setupUniSearch('girl_edu_school', 'girl-uni-dropdown', 'girl-uni-tags', 'girl_edu_tags');
            setupUniSearch('user_edu_school', 'user-uni-dropdown', 'user-uni-tags', 'user_edu_tags');
        })();

        // 截图导入
        var ocrBtnGirl = document.getElementById('girl-ocr-btn');
        var ocrBtnUser = document.getElementById('user-ocr-btn');

        function ocrImport(who) {
            var input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = function () {
                var file = input.files[0];
                if (!file) return;
                var overlay = document.getElementById('search-overlay');
                var text = document.getElementById('search-overlay-text');
                if (overlay) overlay.classList.add('visible');
                if (text) text.textContent = '正在识别截图内容…';
                var fd = new FormData();
                fd.append('image', file);
                fetch('/api/ocr', { method: 'POST', body: fd })
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        if (overlay) overlay.classList.remove('visible');
                        if (data.error) { alert(data.error); return; }
                        var prefix = who + '_';
                        if (data.name) setOcrVal(prefix + 'name', data.name);
                        if (data.age) setOcrVal(prefix + 'age', String(data.age));
                        if (data.hometown) setOcrVal(prefix + 'hometown', data.hometown);
                        if (data.occupation) setOcrVal(prefix + 'occupation', data.occupation);
                        if (data.edu_level) setOcrVal(prefix + 'edu_level', data.edu_level);
                        if (data.edu_school) {
                            var sch = document.getElementById(prefix + 'edu_school');
                            if (sch) { sch.value = data.edu_school; sch.dispatchEvent(new Event('input')); }
                        }
                        if (data.personality) setOcrVal(prefix + 'personality', data.personality);
                        if (data.interests) setOcrVal(prefix + 'interests', data.interests);
                        if (data.values) setOcrVal(prefix + 'values', data.values);
                        if (data.appearance) setOcrVal(prefix + 'appearance', data.appearance);
                    })
                    .catch(function () {
                        if (overlay) overlay.classList.remove('visible');
                        alert('识别失败，请重试');
                    });
            };
            input.click();
        }

        function setOcrVal(id, val) {
            var el = document.getElementById(id);
            if (el && val) { el.value = val; el.style.borderColor = '#50b478'; }
        }

        if (ocrBtnGirl) ocrBtnGirl.addEventListener('click', function () { ocrImport('girl'); });
        if (ocrBtnUser) ocrBtnUser.addEventListener('click', function () { ocrImport('user'); });

        // Ctrl+V 粘贴图片 — 自动识别填入
        document.addEventListener('paste', function (e) {
            var items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (var i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') >= 0) {
                    e.preventDefault();
                    var blob = items[i].getAsFile();
                    var overlay = document.getElementById('search-overlay');
                    var text = document.getElementById('search-overlay-text');
                    if (overlay) overlay.classList.add('visible');
                    if (text) text.textContent = '正在识别截图内容…';
                    var fd = new FormData();
                    fd.append('image', blob);
                    fetch('/api/ocr', { method: 'POST', body: fd })
                        .then(function (r) { return r.json(); })
                        .then(function (data) {
                            if (overlay) overlay.classList.remove('visible');
                            if (data.error) { alert(data.error); return; }
                            // 优先填入空字段
                            Object.keys(data).forEach(function (key) {
                                if (data[key]) {
                                    var gId = 'girl_' + key, uId = 'user_' + key;
                                    var gEl = document.getElementById(gId);
                                    var uEl = document.getElementById(uId);
                                    if (gEl && !gEl.value) setOcrVal(gId, String(data[key]));
                                    else if (uEl && !uEl.value) setOcrVal(uId, String(data[key]));
                                    else if (gEl) setOcrVal(gId, String(data[key]));
                                }
                            });
                            // 处理学校字段的特殊情况
                            ['edu_school'].forEach(function (k) {
                                if (data[k]) {
                                    var gSch = document.getElementById('girl_' + k), uSch = document.getElementById('user_' + k);
                                    if (gSch) { gSch.value = data[k]; gSch.dispatchEvent(new Event('input')); }
                                    if (uSch) { uSch.value = data[k]; uSch.dispatchEvent(new Event('input')); }
                                }
                            });
                        })
                        .catch(function () { if (overlay) overlay.classList.remove('visible'); });
                    break;
                }
            }
        });

        // 主题切换
        (function () {
            const toggle = document.getElementById('theme-toggle');
            const html = document.documentElement;
            const saved = localStorage.getItem('theme');
            if (saved) html.setAttribute('data-theme', saved);
            toggle.addEventListener('click', () => {
                const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        })();
    </script>
</body>
</html>
